<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name or "Vanta Pilot" }} - Error</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/app.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-xl shell-card p-6 space-y-4">
        <h1 class="text-2xl font-semibold text-slate-900">Something went wrong</h1>
        <p class="text-slate-600">{{ error_message }}</p>
        <div class="rounded-lg bg-slate-100 p-3 text-sm text-slate-700">
            <strong>Request ID:</strong> {{ request_id }}
        </div>
        <div class="flex items-center gap-2">
            <a href="/dashboard" class="btn btn-primary">Back to Dashboard</a>
            <a href="/system-check" class="btn btn-muted">System Check</a>
        </div>
    </div>
</body>
</html>
