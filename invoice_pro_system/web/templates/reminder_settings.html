{% extends "base.html" %}

{% block title %}Reminder Settings{% endblock %}

{% block content %}
<div class="space-y-5">
    <div>
        <h1 class="text-2xl font-semibold text-slate-900">Reminder Settings</h1>
        <p class="text-slate-500">Configure automatic overdue reminder intervals.</p>
    </div>

    {% if message %}
    <div class="notice-ok">{{ message }}</div>
    {% endif %}
    {% if error %}
    <div class="notice-err">{{ error }}</div>
    {% endif %}

    <section class="shell-card p-5">
        <form method="post" action="/settings/reminders" class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <label class="inline-flex items-center gap-2 text-sm text-slate-700 md:col-span-2">
                <input type="checkbox" name="enabled" {% if settings.enabled %}checked{% endif %}>
                Enable automatic overdue reminders
            </label>

            <div>
                <label class="block text-sm text-slate-600 mb-1">Interval (days)</label>
                <input type="number" min="1" name="interval_days" value="{{ settings.interval_days or 7 }}" class="field" />
            </div>
            <div>
                <label class="block text-sm text-slate-600 mb-1">Start after overdue days</label>
                <input type="number" min="0" name="start_after_days_overdue" value="{{ settings.start_after_days_overdue or 0 }}" class="field" />
            </div>
            <div>
                <label class="block text-sm text-slate-600 mb-1">Max reminders per invoice</label>
                <input type="number" min="1" name="max_reminders" value="{{ settings.max_reminders or 12 }}" class="field" />
            </div>

            <div class="md:col-span-2">
                <button type="submit" class="btn btn-primary">Save Settings</button>
            </div>
        </form>
    </section>
</div>
{% endblock %}
