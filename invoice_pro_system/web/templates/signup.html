<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name or "Vanta Pilot" }} - Signup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/app.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md shell-card p-6 space-y-4">
        <div>
            <h1 class="text-2xl font-semibold text-slate-900">Create your account</h1>
            <p class="text-slate-500">Start using {{ app_name or "Vanta Pilot" }}</p>
        </div>

        {% if error %}
        <div class="notice-err">{{ error }}</div>
        {% endif %}

        <form method="post" action="/signup" class="space-y-3">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div>
                <label class="block text-sm text-slate-600 mb-1">Email</label>
                <input type="email" name="email" required class="field" autocomplete="email" />
            </div>
            <div>
                <label class="block text-sm text-slate-600 mb-1">Password</label>
                <input type="password" name="password" required class="field" autocomplete="new-password" />
            </div>
            <div>
                <label class="block text-sm text-slate-600 mb-1">Confirm Password</label>
                <input type="password" name="confirm_password" required class="field" autocomplete="new-password" />
            </div>
            <button type="submit" class="w-full btn btn-primary">Create Account</button>
        </form>

        <p class="text-sm text-slate-500">
            Already have an account?
            <a class="text-indigo-700 hover:text-indigo-900" href="/login">Login</a>
        </p>
    </div>
</body>
</html>
